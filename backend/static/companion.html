<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>TeleSol Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #06090F;
      color: #F1F5F9;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      -webkit-user-select: none;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(12, 18, 32, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(30, 45, 74, 0.6);
      position: relative;
      z-index: 20;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #00D4FF, #A855F7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      color: #fff;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #00D4FF, #A855F7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .conn-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'SF Mono', 'Menlo', monospace;
    }

    .conn-badge.connected { background: rgba(0, 255, 136, 0.15); color: #00FF88; }
    .conn-badge.disconnected { background: rgba(255, 59, 92, 0.15); color: #FF3B5C; }

    .conn-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .conn-badge.connected .conn-dot { background: #00FF88; box-shadow: 0 0 8px #00FF88; }
    .conn-badge.disconnected .conn-dot { background: #FF3B5C; }

    /* ── Camera Container ── */
    .camera-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    #videoEl {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #canvasOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Capture canvas (hidden) */
    #captureCanvas { display: none; }

    /* ── Detection Overlay ── */
    .detection-overlay {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    .det-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'SF Mono', monospace;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .det-people {
      background: rgba(0, 212, 255, 0.2);
      border: 1px solid rgba(0, 212, 255, 0.4);
      color: #00D4FF;
    }

    .det-noise {
      background: rgba(255, 184, 0, 0.2);
      border: 1px solid rgba(255, 184, 0, 0.4);
      color: #FFB800;
    }

    .det-gps {
      background: rgba(0, 255, 136, 0.2);
      border: 1px solid rgba(0, 255, 136, 0.4);
      color: #00FF88;
    }

    .det-model {
      background: rgba(168, 85, 247, 0.2);
      border: 1px solid rgba(168, 85, 247, 0.4);
      color: #A855F7;
      font-size: 10px;
    }

    /* ── FPS Counter ── */
    .fps-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
      font-family: 'SF Mono', monospace;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      color: #00FF88;
      z-index: 10;
    }

    /* ── Bottom Panel ── */
    .bottom-panel {
      background: rgba(12, 18, 32, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(30, 45, 74, 0.6);
      padding: 14px 16px;
      z-index: 20;
    }

    /* Audio Meter */
    .audio-meter {
      margin-bottom: 12px;
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .meter-label span {
      font-size: 11px;
      color: #94A3B8;
      font-family: 'SF Mono', monospace;
    }

    .meter-label .db-value {
      font-size: 14px;
      font-weight: 700;
      color: #FFB800;
    }

    .meter-bar-wrap {
      height: 8px;
      background: rgba(30, 45, 74, 0.6);
      border-radius: 4px;
      overflow: hidden;
    }

    .meter-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.15s ease, background 0.3s ease;
      min-width: 2px;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat-card {
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid rgba(30, 45, 74, 0.5);
      border-radius: 10px;
      padding: 10px;
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 18px;
      font-weight: 800;
      font-family: 'SF Mono', monospace;
    }

    .stat-card .stat-label {
      font-size: 9px;
      color: #64748B;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* Start/Stop Button */
    .btn-stream {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'SF Mono', monospace;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      letter-spacing: 0.5px;
    }

    .btn-stream.start {
      background: linear-gradient(135deg, #00D4FF, #0099CC);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
    }

    .btn-stream.stop {
      background: linear-gradient(135deg, #FF3B5C, #CC2244);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255, 59, 92, 0.3);
    }

    .btn-stream:active {
      transform: scale(0.98);
    }

    /* ── Splash / Loading ── */
    .splash {
      position: fixed;
      inset: 0;
      background: #06090F;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    .splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #00D4FF, #A855F7);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 28px;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
    }

    .splash h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00D4FF, #A855F7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .splash p {
      font-size: 13px;
      color: #64748B;
      margin-bottom: 24px;
    }

    .loading-bar {
      width: 200px;
      height: 4px;
      background: rgba(30, 45, 74, 0.6);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00D4FF, #A855F7);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .splash .status-text {
      font-size: 11px;
      color: #64748B;
      font-family: 'SF Mono', monospace;
      margin-top: 12px;
    }

    /* ── Main Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Pulse animation ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .animate-pulse { animation: pulse 2s ease-in-out infinite; }

    /* ── Recording indicator ── */
    .rec-dot {
      width: 8px;
      height: 8px;
      background: #FF3B5C;
      border-radius: 50%;
      animation: pulse 1s ease-in-out infinite;
      box-shadow: 0 0 8px #FF3B5C;
    }
  </style>
</head>
<body>

<!-- Splash Screen -->
<div class="splash" id="splash">
  <div class="splash-logo">T</div>
  <h2>TeleSol Companion</h2>
  <p>Initializing camera &amp; sensors...</p>
  <div class="loading-bar">
    <div class="loading-fill" id="loadingFill"></div>
  </div>
  <div class="status-text" id="splashStatus">Loading TensorFlow.js...</div>
</div>

<!-- Main App -->
<div class="app" id="app" style="display:none;">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">T</div>
      <h1>TeleSol</h1>
    </div>
    <div class="conn-badge disconnected" id="connBadge">
      <div class="conn-dot"></div>
      <span id="connText">Offline</span>
    </div>
  </div>

  <!-- Camera View -->
  <div class="camera-wrap">
    <video id="videoEl" autoplay playsinline muted></video>
    <canvas id="canvasOverlay"></canvas>
    <canvas id="captureCanvas"></canvas>

    <!-- Detection Badges -->
    <div class="detection-overlay">
      <div class="det-badge det-people">
        <span>👤</span>
        <span id="detPeople">0 people</span>
      </div>
      <div class="det-badge det-noise">
        <span>🎙</span>
        <span id="detNoise">0 dB</span>
      </div>
      <div class="det-badge det-gps" id="gpsBadge" style="display:none;">
        <span>📍</span>
        <span id="detGps">--</span>
      </div>
      <div class="det-badge det-model" id="modelBadge" style="display:none;">
        <span>🧠</span>
        <span>COCO-SSD ready</span>
      </div>
    </div>

    <!-- FPS -->
    <div class="fps-badge" id="fpsBadge">-- FPS</div>
  </div>

  <!-- Bottom Panel -->
  <div class="bottom-panel">
    <!-- Audio Meter -->
    <div class="audio-meter">
      <div class="meter-label">
        <span>🎤 AUDIO LEVEL</span>
        <span class="db-value" id="dbValue">0 dB</span>
      </div>
      <div class="meter-bar-wrap">
        <div class="meter-bar" id="meterBar" style="width: 0%; background: #00FF88;"></div>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" style="color: #00D4FF;" id="statFrames">0</div>
        <div class="stat-label">Frames Sent</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color: #00FF88;" id="statStreams">0</div>
        <div class="stat-label">Data Streams</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color: #A855F7;" id="statUptime">0s</div>
        <div class="stat-label">Uptime</div>
      </div>
    </div>

    <!-- Stream Button -->
    <button class="btn-stream start" id="btnStream" onclick="toggleStream()">
      ▶ START STREAMING
    </button>
  </div>
</div>

<!-- TensorFlow.js + COCO-SSD -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════
// TeleSol Web Companion — Main Logic
// ═══════════════════════════════════════════════════════

// ── State ─────────────────────────────────────────────
let isStreaming = false;
let ws = null;
let model = null; // COCO-SSD model
let audioCtx = null;
let analyser = null;
let audioStream = null;
let videoStream = null;
let personCount = 0;
let noiseDb = 0;
let peakDb = 0;
let gpsLat = null;
let gpsLng = null;
let gpsAccuracy = null;
let framesSent = 0;
let streamsSent = 0;
let startTime = null;
let detectionLoop = null;
let frameLoop = null;
let dataLoop = null;
let uptimeLoop = null;
let fpsFrames = 0;
let fpsLastTime = performance.now();

// ── DOM Elements ──────────────────────────────────────
const videoEl = document.getElementById('videoEl');
const canvasOverlay = document.getElementById('canvasOverlay');
const captureCanvas = document.getElementById('captureCanvas');
const overlayCtx = canvasOverlay.getContext('2d');
const captureCtx = captureCanvas.getContext('2d');

// ── Backend URL (auto-detect from page URL) ───────────
function getWsUrl() {
  const loc = window.location;
  const protocol = loc.protocol === 'https:' ? 'wss:' : 'ws:';
  return `${protocol}//${loc.host}/ws/phone`;
}

// ── Initialize ────────────────────────────────────────
async function init() {
  const fill = document.getElementById('loadingFill');
  const status = document.getElementById('splashStatus');

  try {
    // Step 1: Load TF.js model
    fill.style.width = '20%';
    status.textContent = 'Loading TensorFlow.js...';
    await tf.ready();

    fill.style.width = '50%';
    status.textContent = 'Loading COCO-SSD model...';
    model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });

    fill.style.width = '80%';
    status.textContent = 'Requesting camera & mic...';

    // Step 2: Get camera + mic
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: true
    });

    videoStream = stream;
    videoEl.srcObject = stream;
    await videoEl.play();

    // Setup audio analyser
    setupAudio(stream);

    // Setup capture canvas size
    videoEl.addEventListener('loadedmetadata', () => {
      canvasOverlay.width = videoEl.videoWidth;
      canvasOverlay.height = videoEl.videoHeight;
      captureCanvas.width = 480; // Reduced resolution for streaming
      captureCanvas.height = 360;
    });

    fill.style.width = '95%';
    status.textContent = 'Requesting GPS...';

    // Step 3: GPS
    startGPS();

    fill.style.width = '100%';
    status.textContent = 'Ready!';

    // Show model badge
    document.getElementById('modelBadge').style.display = 'flex';

    // Show app
    setTimeout(() => {
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('app').style.display = 'flex';
    }, 500);

  } catch (err) {
    status.textContent = `Error: ${err.message}`;
    fill.style.background = '#FF3B5C';
    console.error('Init error:', err);

    // Still show the app even if something failed
    setTimeout(() => {
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('app').style.display = 'flex';
    }, 2000);
  }
}

// ── Audio Setup ───────────────────────────────────────
function setupAudio(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.8;
  source.connect(analyser);

  // Start metering
  meterAudio();
}

function meterAudio() {
  if (!analyser) return;
  const dataArray = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(dataArray);

  // Calculate RMS
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    sum += dataArray[i] * dataArray[i];
  }
  const rms = Math.sqrt(sum / dataArray.length);

  // Convert to dB (approx SPL)
  const dbFS = 20 * Math.log10(Math.max(rms, 1e-10));
  noiseDb = Math.max(0, Math.round(dbFS + 100)); // Rough dBFS → SPL offset

  if (noiseDb > peakDb) peakDb = noiseDb;

  // Update UI
  updateAudioMeter(noiseDb);

  requestAnimationFrame(meterAudio);
}

function updateAudioMeter(db) {
  const pct = Math.min(100, (db / 100) * 100);
  const bar = document.getElementById('meterBar');
  const val = document.getElementById('dbValue');
  const noiseText = document.getElementById('detNoise');

  let color;
  if (db < 40) color = '#00FF88';
  else if (db < 60) color = '#FFB800';
  else color = '#FF3B5C';

  bar.style.width = pct + '%';
  bar.style.background = color;
  val.textContent = db + ' dB';
  val.style.color = color;
  noiseText.textContent = db + ' dB';
}

// ── GPS ───────────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) return;

  navigator.geolocation.watchPosition(
    (pos) => {
      gpsLat = pos.coords.latitude;
      gpsLng = pos.coords.longitude;
      gpsAccuracy = pos.coords.accuracy;

      const badge = document.getElementById('gpsBadge');
      const text = document.getElementById('detGps');
      badge.style.display = 'flex';
      text.textContent = `${gpsLat.toFixed(4)}, ${gpsLng.toFixed(4)}`;
    },
    (err) => console.warn('GPS error:', err.message),
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
}

// ── Person Detection ──────────────────────────────────
async function runDetection() {
  if (!model || !videoEl.videoWidth) return;

  try {
    const predictions = await model.detect(videoEl);

    // Filter for 'person' class only
    const people = predictions.filter(p => p.class === 'person' && p.score > 0.4);
    personCount = people.length;

    // Update UI
    document.getElementById('detPeople').textContent = `${personCount} ${personCount === 1 ? 'person' : 'people'}`;

    // Draw bounding boxes
    drawDetections(people);

    // FPS counting
    fpsFrames++;
    const now = performance.now();
    if (now - fpsLastTime >= 1000) {
      document.getElementById('fpsBadge').textContent = fpsFrames + ' FPS';
      fpsFrames = 0;
      fpsLastTime = now;
    }
  } catch (err) {
    console.warn('Detection error:', err);
  }
}

function drawDetections(people) {
  overlayCtx.clearRect(0, 0, canvasOverlay.width, canvasOverlay.height);

  people.forEach(p => {
    const [x, y, w, h] = p.bbox;
    const confidence = Math.round(p.score * 100);

    // Bounding box
    overlayCtx.strokeStyle = '#00D4FF';
    overlayCtx.lineWidth = 2;
    overlayCtx.strokeRect(x, y, w, h);

    // Corner accents
    const cornerLen = 12;
    overlayCtx.strokeStyle = '#00D4FF';
    overlayCtx.lineWidth = 3;

    // Top-left
    overlayCtx.beginPath();
    overlayCtx.moveTo(x, y + cornerLen); overlayCtx.lineTo(x, y); overlayCtx.lineTo(x + cornerLen, y);
    overlayCtx.stroke();

    // Top-right
    overlayCtx.beginPath();
    overlayCtx.moveTo(x + w - cornerLen, y); overlayCtx.lineTo(x + w, y); overlayCtx.lineTo(x + w, y + cornerLen);
    overlayCtx.stroke();

    // Bottom-left
    overlayCtx.beginPath();
    overlayCtx.moveTo(x, y + h - cornerLen); overlayCtx.lineTo(x, y + h); overlayCtx.lineTo(x + cornerLen, y + h);
    overlayCtx.stroke();

    // Bottom-right
    overlayCtx.beginPath();
    overlayCtx.moveTo(x + w - cornerLen, y + h); overlayCtx.lineTo(x + w, y + h); overlayCtx.lineTo(x + w, y + h - cornerLen);
    overlayCtx.stroke();

    // Label
    const label = `Person ${confidence}%`;
    overlayCtx.font = '12px SF Mono, monospace';
    const tw = overlayCtx.measureText(label).width;
    overlayCtx.fillStyle = 'rgba(0, 212, 255, 0.8)';
    overlayCtx.fillRect(x, y - 20, tw + 12, 18);
    overlayCtx.fillStyle = '#fff';
    overlayCtx.fillText(label, x + 6, y - 6);
  });
}

// ── WebSocket ─────────────────────────────────────────
function connectWS() {
  const url = getWsUrl();
  ws = new WebSocket(url);

  ws.onopen = () => {
    console.log('[WS] Connected');
    updateConnStatus(true);

    // Send registration
    ws.send(JSON.stringify({
      type: 'register',
      deviceName: navigator.userAgent.includes('iPhone') ? 'iPhone' : 'Mobile',
      osType: 'web',
      osVersion: navigator.userAgent,
    }));
  };

  ws.onclose = () => {
    console.log('[WS] Disconnected');
    updateConnStatus(false);
    // Auto-reconnect
    if (isStreaming) {
      setTimeout(connectWS, 3000);
    }
  };

  ws.onerror = (err) => {
    console.warn('[WS] Error');
    updateConnStatus(false);
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'crs_update') {
        // Could display CRS on companion if wanted
        console.log('[WS] CRS:', msg.crs, msg.level);
      }
    } catch (e) { /* ignore */ }
  };
}

function updateConnStatus(connected) {
  const badge = document.getElementById('connBadge');
  const text = document.getElementById('connText');
  badge.className = 'conn-badge ' + (connected ? 'connected' : 'disconnected');
  text.textContent = connected ? 'Live' : 'Offline';
}

// ── Frame Capture & Send ──────────────────────────────
function captureAndSendFrame() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (!videoEl.videoWidth) return;

  // Draw to capture canvas (reduced size)
  captureCtx.drawImage(videoEl, 0, 0, captureCanvas.width, captureCanvas.height);

  // Encode as JPEG
  const dataUrl = captureCanvas.toDataURL('image/jpeg', 0.6);
  const base64 = dataUrl.split(',')[1];

  ws.send(JSON.stringify({
    type: 'frame',
    data: base64,
    personCount: personCount,
    noiseDb: noiseDb,
    timestamp: Date.now(),
  }));

  framesSent++;
  document.getElementById('statFrames').textContent = framesSent;
}

// ── Send Sensor Data ──────────────────────────────────
function sendSensorData() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  ws.send(JSON.stringify({
    type: 'sensors',
    personCount: personCount,
    motionDetected: personCount > 0,
    noiseDb: noiseDb,
    peakDb: peakDb,
    isCrowdNoise: noiseDb > 60,
    gpsLatitude: gpsLat,
    gpsLongitude: gpsLng,
    gpsAccuracy: gpsAccuracy,
    timestamp: Date.now(),
  }));

  streamsSent++;
  document.getElementById('statStreams').textContent = streamsSent;
}

// ── Stream Toggle ─────────────────────────────────────
function toggleStream() {
  if (isStreaming) {
    stopStreaming();
  } else {
    startStreaming();
  }
}

function startStreaming() {
  isStreaming = true;
  startTime = Date.now();
  framesSent = 0;
  streamsSent = 0;
  peakDb = 0;

  // Resume audio context (required by iOS Safari after user interaction)
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  // Connect WebSocket
  connectWS();

  // Person detection loop (~5 FPS)
  detectionLoop = setInterval(runDetection, 200);

  // Frame capture loop (~2 FPS)
  frameLoop = setInterval(captureAndSendFrame, 500);

  // Sensor data loop (every 3s)
  dataLoop = setInterval(sendSensorData, 3000);

  // Uptime counter
  uptimeLoop = setInterval(() => {
    const elapsed = Math.round((Date.now() - startTime) / 1000);
    const min = Math.floor(elapsed / 60);
    const sec = elapsed % 60;
    document.getElementById('statUptime').textContent =
      min > 0 ? `${min}m ${sec}s` : `${sec}s`;
  }, 1000);

  // Update button
  const btn = document.getElementById('btnStream');
  btn.className = 'btn-stream stop';
  btn.innerHTML = '<div class="rec-dot"></div> STOP STREAMING';
}

function stopStreaming() {
  isStreaming = false;

  clearInterval(detectionLoop);
  clearInterval(frameLoop);
  clearInterval(dataLoop);
  clearInterval(uptimeLoop);

  if (ws) {
    ws.close();
    ws = null;
  }

  updateConnStatus(false);

  // Update button
  const btn = document.getElementById('btnStream');
  btn.className = 'btn-stream start';
  btn.innerHTML = '▶ START STREAMING';
}

// ── Boot ──────────────────────────────────────────────
init();
</script>
